<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MervalBot Dashboard</title>
    <style>
        body {
            background: #080b14;
            color: #e0e6f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: #10162a;
            padding: 1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card {
            background: #131a2a;
            margin: 1em;
            padding: 1em;
            border-radius: 8px;
            box-shadow: 0 2px 8px #0004;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1em;
        }
        th, td {
            padding: 0.5em;
            border-bottom: 1px solid #222b44;
            text-align: left;
        }
        th {
            background: #181f33;
        }
        .open-trades {
            margin: 1em;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <span id="balance">ARS: - USD: -</span>
            <span id="mode" style="margin-left:2em;">Modo: -</span>
        </div>
        <div>
            Estado: <span id="status">-</span>
            &nbsp;|&nbsp; Última actualización: <span id="last_update">-</span>
        </div>
    </header>
    <main id="main"></main>
    <section class="open-trades">
        <h2>Posiciones Abiertas</h2>
        <table id="open_trades_table">
            <thead>
                <tr><th>Strategy</th><th>Symbol</th><th>Entry</th><th>SL</th><th>TP</th><th>Qty</th><th>Status</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
    <section class="recent-actions">
        <h2>Acciones y Decisiones Recientes</h2>
        <ul id="recent_actions"></ul>
    </section>
    <section class="activity" id="activity">
      <h2>Activity Log</h2>
      <div id="activity-list"></div>
    </section>
    <script>
    async function fetchState() {
        const res = await fetch('/api/state');
        return await res.json();
    }
    async function fetchOpenTrades() {
        const res = await fetch('/api/trades?limit=100');
        return await res.json();
    }
    function render() {
        fetchState().then(state => {
            document.getElementById('balance').textContent = `ARS: ${state.balance.ars} USD: ${state.balance.usd}`;
            document.getElementById('last_update').textContent = state.server_time;
            document.getElementById('status').textContent = state.status;
            let mode = (state.strategies[0]?.mode || 'PAPER').toUpperCase();
            document.getElementById('mode').textContent = `Modo: ${mode}`;
            let main = document.getElementById('main');
            main.innerHTML = '';
            state.strategies.forEach(s => {
                let card = document.createElement('div');
                card.className = 'card';
                if (s.mode === 'disabled') card.style.opacity = 0.4;
                let badge = s.mode === 'disabled' ? '<span style="background:#b44;color:#fff;padding:2px 6px;border-radius:4px;font-size:0.7em;margin-left:8px;">DISABLED</span>' : '';
                card.innerHTML = `<h2>${s.name} [${s.mode.toUpperCase()}]${badge}</h2>
                    <div>Win rate: ${(s.win_rate*100).toFixed(1)}% | PnL: ${s.pnl_ars.toFixed(2)} ARS | Trades: ${s.n_trades}</div>
                    <div>Posiciones abiertas: ${s.open_trades}</div>
                    ${s.note ? `<div style='color:#b44;font-size:0.9em;'>${s.note}</div>` : ''}
                    <table><thead><tr><th>Última señal</th><th>Acción</th><th>Precio</th><th>SL</th><th>TP</th><th>Confianza</th></tr></thead>
                    <tbody>${s.last_signal ? `<tr><td>${s.last_signal.symbol}</td><td>${s.last_signal.action}</td><td>${s.last_signal.entry_price}</td><td>${s.last_signal.sl_price}</td><td>${s.last_signal.tp_price}</td><td>${(s.last_signal.confidence*100).toFixed(1)}%</td></tr>` : '<tr><td colspan="6">-</td></tr>'}</tbody></table>`;
                main.appendChild(card);
            });
            // Acciones y decisiones recientes
            let actions = state.recent_actions || [];
            let ul = document.getElementById('recent_actions');
            if (ul) ul.innerHTML = actions.length ? actions.map(a => `<li>${a.message}</li>`).join('') : '<li>-</li>';
            // Activity log
            const list = document.getElementById('activity-list');
            list.innerHTML = (state.recent_actions || []).slice().reverse().map(a =>
                `<div class="activity-item"><span class="activity-ts">${a.ts.slice(11,19)}</span>${a.message}</div>`
            ).join('');
        });
        fetchOpenTrades().then(trades => {
            let tbody = document.querySelector('#open_trades_table tbody');
            tbody.innerHTML = '';
            trades.filter(t => t.status === 'OPEN').forEach(t => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td>${t.strategy_id}</td><td>${t.symbol}</td><td>${t.entry_price}</td><td>${t.sl_price}</td><td>${t.tp_price}</td><td>${t.quantity}</td><td>${t.status}</td>`;
                tbody.appendChild(tr);
            });
        });
    }
    render();
    setInterval(render, 30000);
    </script>
    <style>
    .activity { margin-top: 2rem; padding: 1rem; background: #0f1320;
      border-radius: 8px; max-height: 400px; overflow-y: auto; }
    .activity h2 { font-size: 0.9rem; color: #8892a6; margin: 0 0 0.5rem; }
    #activity-list { font-family: monospace; font-size: 0.75rem;
      color: #c5cde0; }
    .activity-item { padding: 2px 0; border-bottom: 1px solid #1a2033; }
    .activity-ts { color: #5a6378; margin-right: 8px; }
    </style>
</body>
</html>
